name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaleaza dependentele fixate (lockfile)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Verifica lockfile la zi
        run: python scripts/lock.py --check

      - name: Teste (pytest + acoperire)
        run: pytest -q --cov=evaluare --cov-report=term-missing
