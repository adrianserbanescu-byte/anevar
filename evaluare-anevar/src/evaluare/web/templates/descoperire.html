<!DOCTYPE html>
<html lang="ro">
<head><meta charset="utf-8"><title>Descoperire comparabile</title>
<style>{% include "_design.css" %}</style></head>
<body>
<a class="skip-link" href="#continut">Sari la conținut</a>
{% set kicker = "Registru de evaluare" %}{% set titlu = "Descoperire comparabile" %}{% set subtitlu = "Căutare de comparabile pe portaluri, cu scor de relevanță." %}{% include "_cartus.html" %}
<main id="continut">
<form id="f">
  <label for="portal">Portal:</label> <select id="portal" name="portal"><option value="imobiliare">imobiliare.ro</option>
    <option value="storia">storia.ro</option></select>
  <label for="judet">Judet:</label> <input id="judet" name="judet" value="ilfov">
  <label for="localitate">Localitate:</label> <input id="localitate" name="localitate" value="otopeni"><br>
  <b>Casa subiect:</b> <label for="an">An</label> <input id="an" name="an" value="2013" size="5">
   <label for="stare">Stare(1-5)</label> <input id="stare" name="stare" value="3" size="3">
   <label for="finisaj">Finisaj(1-4)</label> <input id="finisaj" name="finisaj" value="4" size="3">
   <label for="incalzire">Incalzire</label> <input id="incalzire" name="incalzire" value="centrala_gaz" size="14">
   <label for="teren">Teren mp</label> <input id="teren" name="teren" value="500" size="6"><br>
  <label for="secundare">Atribute secundare (unul pe linie, „nume: valoare"):</label><br>
  <textarea id="secundare" name="secundare" rows="3" cols="40" placeholder="tamplarie: termopan"></textarea><br>
  <button type="submit">Caută comparabile</button>
  <span id="desc-status" class="hint" role="status" aria-live="polite"></span>
</form>

<!-- Tabelul de metodologie: ÎNAINTE de rezultate -->
<div id="metodologie"></div>
<h2>Rezultate</h2>
<div id="rezultate" role="region" aria-label="Rezultate descoperire"></div>
</main>

<script>
function randMetodologie(m){
  let h = '<h2>Metodologie scoring</h2><table><tr><th>#</th><th>Atribut</th>'
        + '<th>Pondere</th><th>Cota</th><th>Formula d</th></tr>';
  m.forEach(r => h += `<tr><td>${r.nr}</td><td>${r.atribut}</td><td>${r.pondere}</td>`
                    + `<td>${r.cota}</td><td><code>${r.formula}</code></td></tr>`);
  h += '</table><p class="hint">Relevanță = 100 × (1 − Σ(pondere×d)/Σ(ponderi cunoscute)); '
     + 'atributele „nementionat" sunt excluse.</p>';
  return h;
}
function badgeClass(c){
  if(c.incredere_scazuta) return 'b-low';
  if(c.relevanta>=80) return 'b-high';
  if(c.relevanta>=60) return 'b-mid';
  return 'b-low';
}
const STARE_LBL={'1':'Degradată','2':'Necesită renovare','3':'Medie / bună','4':'Foarte bună / renovată','5':'Nouă'};
const FINISAJ_LBL={'1':'Modest','2':'Standard','3':'Superior','4':'Lux'};
function eticheta(nume,v){
  if(v===null||v===undefined||v==='') return '➖';
  if(nume==='Stare' && STARE_LBL[v]) return STARE_LBL[v]+' ('+v+')';
  if(nume==='Finisaj' && FINISAJ_LBL[v]) return FINISAJ_LBL[v]+' ('+v+')';
  return v;
}
function tabelAtribute(c){
  const A=c.atribute;
  const head='<tr><th>Criteriu</th>'+A.map(a=>`<th>${a.nume}</th>`).join('')+'</tr>';
  const ref ='<tr><td>Referință (subiect)</td>'+A.map(a=>`<td>${eticheta(a.nume,a.valoare_subiect)}</td>`).join('')+'</tr>';
  const gas ='<tr><td>Găsit în anunț</td>'+A.map(a=>`<td>${eticheta(a.nume,a.valoare_candidat)}</td>`).join('')+'</tr>';
  const dd  ='<tr><td>d (folosit în formulă)</td>'+A.map(a=>`<td>${a.cunoscut?a.d:'<i>neaplicabil</i>'}</td>`).join('')+'</tr>';
  const pon ='<tr><td>Pondere</td>'+A.map(a=>`<td>${a.pondere}</td>`).join('')+'</tr>';
  return '<table class="detalii">'+head+ref+gas+dd+pon+'</table>';
}
function randCandidat(c){
  const secId = (c.secundare||[]).filter(s=>s.stare!=='nementionat');
  const sec = secId.map(s => `${s.nume}: ${s.stare}`
     + (s.valoare_gasita ? ` („${s.valoare_gasita}")` : '')).join(' · ');
  let avert = c.incredere_scazuta ? ' <span class="alerta">(date insuficiente — verifică manual)</span>' : '';
  return `<div class="candidat">
    <h3><label><input type="checkbox" class="bif" data-pret="${c.pret||''}" data-supr="${c.suprafata||''}">
      <span class="badge ${badgeClass(c)}">${c.relevanta}%</span>
      <span class="pret">${c.pret?c.pret+' '+(c.moneda||'EUR'):'preț ?'}</span>
      · ${c.suprafata||'?'} mp construiți · teren ${c.teren||'?'} mp${c.pret_mp?' · <b>'+c.pret_mp+' €/mp</b> (teren comparabil)':''}${avert}</label></h3>
    <a class="vezi" href="${c.url}" target="_blank">▶ Vezi anunțul${c.titlu?': '+c.titlu:''}</a>
    ${tabelAtribute(c)}
    <p class="hint">${c.explicatie}</p>
    ${sec ? '<p class="hint"><b>Secundare:</b> '+sec+'</p>' : ''}
  </div>`;
}
document.getElementById('f').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const d = Object.fromEntries(new FormData(e.target).entries());
  const payload = {portal:d.portal, judet:d.judet, localitate:d.localitate,
    subiect:{an:parseInt(d.an)||null, stare:parseInt(d.stare)||null,
      finisaj:parseInt(d.finisaj)||null, incalzire:d.incalzire||null, teren:d.teren||null},
    atribute_secundare:(d.secundare||'').split('\n').filter(Boolean), max_candidati:8};
  const r = await fetch('/api/descopera',{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const res = await r.json();
  document.getElementById('desc-status').textContent = res.candidati.length + ' candidați găsiți';
  document.getElementById('metodologie').innerHTML = randMetodologie(res.metodologie);
  document.getElementById('rezultate').innerHTML =
    res.candidati.map(randCandidat).join('')
    + '<button id="copiaza">Copiază comparabilele bifate (pret;suprafata)</button> '
    + '<button id="laGrila">➜ Trimite bifatele la grila casă</button><pre id="out"></pre>';
  document.getElementById('copiaza').addEventListener('click', ()=>{
    const linii = [...document.querySelectorAll('.bif:checked')]
      .map(b => b.dataset.pret + ';' + b.dataset.supr);
    document.getElementById('out').textContent = linii.join('\n');
  });
  document.getElementById('laGrila').addEventListener('click', ()=>{
    const sel = [...document.querySelectorAll('.bif:checked')]
      .map(b => ({pret:b.dataset.pret, suprafata:b.dataset.supr}))
      .filter(c => c.pret && c.suprafata);
    if(sel.length===0){ document.getElementById('out').textContent='Bifează cel puțin un comparabil.'; return; }
    localStorage.setItem('grila_prefill_casa', JSON.stringify(sel));
    document.getElementById('out').textContent =
      sel.length + ' comparabil(e) trimise. Se deschide grila…';
    window.location.href = '/grila';
  });
});
</script>
</body></html>
