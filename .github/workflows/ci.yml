# NOTA: fisierul sta la RADACINA repo-ului (.github/) — evaluare-anevar/.github/ NU e citit de GitHub.
name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: evaluare-anevar

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaleaza dependentele fixate (lockfile)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Verifica lockfile la zi
        run: python scripts/lock.py --check

      - name: Securitate — CVE pe dependente (pip-audit pe lockfile, strict)
        # pip-audit interoghează PyPI Advisory Database. `--strict` = nu trece dacă nu poate verifica;
        # rulează pe lock (versiuni exacte) -> determinism. NU instalează nimic.
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock --strict

      - name: Securitate — SAST pe codul aplicatiei (bandit, severity+confidence MEDIUM+)
        # Bandit = Python SAST clasic. -r src/ = recursiv pe sursa. Threshold MEDIUM+ filtreaza
        # zgomotul (subprocess imports etc.); ridica la HIGH daca cresc false positives.
        run: |
          pip install "bandit[toml]"
          bandit -r src --severity-level medium --confidence-level medium -q

      - name: Pre-compila (elimina race-ul .pyc intre workerii xdist)
        run: python -m compileall -q src tests

      - name: Teste (pytest paralel resilient + acoperire)
        # -n auto: suita pe toate nucleele (pytest-xdist); pytest-cov combina acoperirea
        # per-worker -> gate 90% ramane valid. --dist loadscope: grupeaza testele pe modul
        # (mai stabil, mai putin re-setup). --max-worker-restart=4: daca un worker moare sub
        # presiune (load), xdist il reporneste in loc sa pice colectarea (flakiness sub load).
        # Vezi docs/strategie-testare.md §10.1 (sub load LOCAL greu, foloseste serial / -n 2).
        run: pytest -n auto --dist loadscope --max-worker-restart=4 -q --cov=evaluare --cov-report=term-missing
