# Build .exe de release pe runner Windows (decizia D1 din plan-migrare-mac.md:
# Actions = pipeline principal, PC-ul Windows ramane fallback).
# Declansare: tag v* sau manual (workflow_dispatch, pentru testare fara tag).
# NOTA: fisierul sta la RADACINA repo-ului (.github/) — evaluare-anevar/.github/ NU e citit de GitHub.
name: Release exe

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

defaults:
  run:
    working-directory: evaluare-anevar

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaleaza dependentele fixate + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock pyinstaller
          pip install -e . --no-deps

      # --clean = reproductibil (vezi docs/build.md); --smoke-offline = porneste exe-ul
      # si verifica 5 rute locale, fara apeluri externe (sigur pe runner).
      # Fara UPX in CI (cere upx.exe; diferenta doar ~3 MB) -> exe ~40.6 MB.
      - name: Build .exe (clean) + smoke offline
        run: python scripts/build.py --clean --smoke-offline

      - name: Raporteaza dimensiunea
        run: python -c "from pathlib import Path; p = Path('dist/evaluare-anevar.exe'); print(f'{p.name}: {p.stat().st_size/1e6:.1f} MB')"

      - uses: actions/upload-artifact@v4
        with:
          name: evaluare-anevar-exe-${{ github.ref_name }}
          path: evaluare-anevar/dist/evaluare-anevar.exe
          if-no-files-found: error
          retention-days: 90
